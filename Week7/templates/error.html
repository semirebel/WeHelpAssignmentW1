<!DOCTYPE html>
<html>
    <head>
        <title>Sammi Chen - Week 7 - member system</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <style>
            .container{
                width: 360px;
                background-color: aliceblue;
                margin: 60px auto; /* 上下留白，左右自動平分 */
                border: 1px solid #ccc; /* 外框&陰影 */
                font-family: "Microsoft JhengHei", sans-serif;
                display: flex;
                flex-direction: column;
                justify-content: center;
            }
            .header{
                height: 60px;
                line-height: 60px;
                background-color: darkcyan;
                font-weight: bold;
                font-size: large;
                color: aliceblue;
                text-align: center;  
            }

            .contents{
                padding: 25px 0 30px 0;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                border: 1px solid #ccc;
                line-height: 1.9;
            }

        </style>
    </head>
    <body>
        <div class="container">
            <div class="header">失敗頁面</div>

            <div class="contents">
                {{ message }}
            </div>
        </div>
    </body>
</html>
