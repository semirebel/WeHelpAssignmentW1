<!DOCTYPE html>
<html>
    <head>
        <title>登入失敗</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <style>
            .login-box{
                width: 400px;
                background-color: aliceblue;
                margin: 60px auto; /* 上下留白，左右自動平分 */
                border: 1px solid #ccc; /* 外框&陰影 */
                font-family: "Microsoft JhengHei", sans-serif;
                display: flex;
                flex-direction: column;
                justify-content: center;
            }
            .login-top{
                height: 60px;
                line-height: 60px;
                background-color: darkcyan;
                font-weight: bold;
                font-size: large;
                color: aliceblue;
                text-align: center;  
            }

            .login-contents{
                padding: 25px 0 30px 0;
                text-align: center;
            }
        </style>
    </head>
    <body>
        <div class="login-box">
            <div class="login-top">登入失敗</div>
            <div class="login-contents">{{ message }}</div>
        </div>
    </body>
</html>
